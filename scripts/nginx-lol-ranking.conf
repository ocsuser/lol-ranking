server {
    listen 80;
    server_name 145.241.172.158;

    root /var/www/lol-ranking;
    index index.html;

    # Scrape API — localhost only, never exposed publicly
    location /api/ {
        deny all;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache assets statiques
    location ~* \.(js|css|png|jpg|jpeg|svg|ico|woff|woff2)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Cache JSON mais plus court (données mises à jour quotidiennement)
    location ~* \.json$ {
        expires 1h;
        add_header Cache-Control "public";
    }
}
