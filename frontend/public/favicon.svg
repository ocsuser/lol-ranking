<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Fond sombre -->
  <circle cx="50" cy="50" r="50" fill="#0a0e17"/>

  <!-- Cercle extérieur dark border -->
  <circle cx="50" cy="50" r="48" fill="none" stroke="#1a1200" stroke-width="3"/>

  <!-- Anneau doré extérieur -->
  <circle cx="50" cy="50" r="46" fill="none" stroke="#C8911A" stroke-width="5"/>

  <!-- Boule cyan/bleue intérieure -->
  <radialGradient id="orb" cx="40%" cy="35%" r="60%">
    <stop offset="0%" stop-color="#7ff4f4"/>
    <stop offset="35%" stop-color="#22bfcf"/>
    <stop offset="70%" stop-color="#0e7a99"/>
    <stop offset="100%" stop-color="#042a3a"/>
  </radialGradient>
  <circle cx="50" cy="50" r="38" fill="url(#orb)"/>

  <!-- Anneau intérieur doré (bord du cercle) -->
  <circle cx="50" cy="50" r="38" fill="none" stroke="#C8911A" stroke-width="4"/>

  <!-- Ombre interne du cercle -->
  <circle cx="50" cy="50" r="35" fill="none" stroke="#042a3a" stroke-width="3" opacity="0.5"/>

  <!-- Le "L" doré -->
  <!-- Gradient doré pour le L -->
  <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%"   stop-color="#f0d060"/>
    <stop offset="30%"  stop-color="#C8911A"/>
    <stop offset="60%"  stop-color="#e8b830"/>
    <stop offset="100%" stop-color="#8a5c0a"/>
  </linearGradient>

  <!-- Branche verticale du L (avec épaisseur et bevel) -->
  <!-- Ombre portée -->
  <rect x="24" y="18" width="22" height="56" rx="1" fill="#3a2200" opacity="0.7"/>
  <!-- Corps principal -->
  <rect x="22" y="16" width="22" height="56" rx="1" fill="url(#gold)"/>
  <!-- Reflet gauche -->
  <rect x="22" y="16" width="4" height="56" rx="1" fill="#f5e080" opacity="0.5"/>
  <!-- Bord droit sombre -->
  <rect x="40" y="16" width="4" height="56" rx="1" fill="#6a3c00" opacity="0.6"/>

  <!-- Branche horizontale du L (bas) -->
  <!-- Ombre portée -->
  <rect x="24" y="58" width="52" height="20" rx="1" fill="#3a2200" opacity="0.7"/>
  <!-- Corps principal -->
  <rect x="22" y="56" width="52" height="20" rx="1" fill="url(#gold)"/>
  <!-- Reflet haut -->
  <rect x="22" y="56" width="52" height="4" rx="1" fill="#f5e080" opacity="0.5"/>
  <!-- Bord bas sombre -->
  <rect x="22" y="72" width="52" height="4" rx="1" fill="#6a3c00" opacity="0.6"/>

  <!-- Coin intérieur du L (masque l'overlap) -->
  <rect x="44" y="56" width="30" height="16" rx="0" fill="url(#gold)"/>

  <!-- Anneau doré par-dessus tout (redraw propre) -->
  <circle cx="50" cy="50" r="46" fill="none" stroke="#C8911A" stroke-width="4"/>
  <circle cx="50" cy="50" r="48" fill="none" stroke="#7a5500" stroke-width="2"/>
</svg>
